$schema: 'https://json-schema.org/draft/2020-12/schema'
$id: 'urn:killteam:team.schema.yaml'
title: Kill Team - Team Schema
description: Schema for a Kill Team v3.0 team exported from official PDFs
type: object
required: [id, name, faction, datacards]
additionalProperties: false
properties:
  id:
    type: string
    description: "Unique slug (e.g. 'angels-of-death')"
    pattern: '^[a-z0-9-]+$'
  name:
    type: string
  faction:
    type: string
  factionRules:
    type: array
    description: Faction rules from the Faction Rules PDF
    items:
      $ref: '#/$defs/namedRule'
  strategyPloys:
    type: array
    description: Strategy ploys from the Strategy Ploys PDF
    items:
      $ref: '#/$defs/namedRule'
  firefightPloys:
    type: array
    description: Firefight ploys from the Firefight Ploys PDF
    items:
      $ref: '#/$defs/namedRule'
  factionEquipment:
    type: array
    description: Equipment available from the Faction Equipment PDF
    items:
      $ref: '#/$defs/equipmentItem'
  universalEquipment:
    type: array
    description: Equipment available from the Universal Equipment PDF
    items:
      $ref: '#/$defs/equipmentItem'
  operativeSelection:
    type: object
    description: Team composition rules from the Operative Selection PDF
    additionalProperties: false
    properties:
      archetype:
        type: string
      text:
        type: string
  supplementaryInfo:
    type: string
    description: Raw text from the Supplementary Information PDF (errata, FAQs)
  datacards:
    type: array
    minItems: 1
    items:
      $ref: '#/$defs/operative'
$defs:
  namedRule:
    type: object
    required: [name, text]
    additionalProperties: false
    properties:
      name:
        type: string
      text:
        type: string
  equipmentItem:
    type: object
    required: [name]
    additionalProperties: false
    properties:
      name:
        type: string
      text:
        type: string
  ability:
    type: object
    required: [name, text]
    additionalProperties: false
    properties:
      name:
        type: string
      text:
        type: string
  specialAction:
    type: object
    required: [name, text, apCost]
    additionalProperties: false
    properties:
      name:
        type: string
      text:
        type: string
      apCost:
        type: integer
        description: AP cost of the action. Required; must be at least 1.
        minimum: 1
  weaponRule:
    type: object
    required: [name, text]
    additionalProperties: false
    properties:
      name:
        type: string
      text:
        type: string
  operative:
    type: object
    required: [name, operativeType, stats, weapons]
    additionalProperties: false
    properties:
      name:
        type: string
      operativeType:
        type: string
      keywords:
        type: array
        description: All keywords on the datacard
        items:
          type: string
      primaryKeyword:
        type: string
        description: The team keyword (first in the list, highlighted orange in the PDF)
      stats:
        $ref: '#/$defs/stats'
      weapons:
        type: array
        minItems: 1
        items:
          $ref: '#/$defs/weapon'
      abilities:
        type: array
        description: Named passive rules (no AP cost)
        items:
          $ref: '#/$defs/ability'
      specialActions:
        type: array
        description: Active 1AP actions (AP cost required)
        items:
          $ref: '#/$defs/specialAction'
      specialRules:
        type: array
        description: Custom weapon rule definitions referenced by * in weapon special rules
        items:
          $ref: '#/$defs/weaponRule'
  stats:
    type: object
    required: [move, apl, wounds, save]
    additionalProperties: false
    properties:
      move:
        type: integer
        minimum: 1
      apl:
        type: integer
        minimum: 1
        maximum: 5
      wounds:
        type: integer
        minimum: 1
      save:
        type: string
        pattern: '^[2-6]\+$'
  weapon:
    type: object
    required: [name, type, atk, hit, dmg]
    additionalProperties: false
    properties:
      name:
        type: string
      type:
        type: string
        enum: [Ranged, Melee]
      atk:
        type: integer
        minimum: 1
      hit:
        type: string
        pattern: '^[2-6]\+$'
      dmg:
        type: object
        required: [normal, crit]
        additionalProperties: false
        properties:
          normal:
            type: integer
            minimum: 0
          crit:
            type: integer
            minimum: 0
      weaponRules:
        type: array
        description: 'Individual special rule names (e.g. "Range 8\"", "Piercing 1"). Omitted when empty.'
        items:
          type: string
