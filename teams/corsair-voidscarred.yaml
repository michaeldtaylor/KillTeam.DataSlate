factionEquipment:
  - name: Diuturnal Mantles
    text: |-
      The cloaks worn by Corsair Voidscarred operatives are woven from psychoactive material that hardens in response to explosions and fluctuations in temperature.
      
      Whenever an operative is shooting a friendly **CORSAIR VOIDSCARRED** operative, if the ranged weapon in that sequence has the Blast or Torrent weapon rule, you can re-roll one of your defence dice. In addition, friendly **CORSAIR VOIDSCARRED** operatives aren't affected by the x" Devastating x weapon rule (i.e. Devastating with a distance) unless they are the target during that sequence.
  - name: Mistfield
    text: |-
      A mistfield projects a field of thick moisture around the bearer that not only obscures their form, but also slows bullets, reducing their lethality.
      
      Once per turning point, when an operative is shooting a friendly **CORSAIR VOIDSCARRED** operative more than 3" from it, at the start of the Roll Defence Dice step, you can use this rule. If you do, worsen the x of the Piercing weapon rule by 1 (if any) until the end of that sequence.
      
      Note that Piercing 1 would therefore be ignored.
  - name: Runes of Guidance
    text: |-
      Corsair psykers wield warp powers with consummate precision, lending their foresight to distant allies.
      
      Once per turning point, when a friendly **CORSAIR VOIDSCARRED WAY SEEKER** or **CORSAIR VOIDSCARRED SOUL WEAVER** operative is performing a PSYCHIC unique action (excluding Warp Fold), you can use this rule. If you do, until the end of that action, add 3" to its distance requirement.
      
      Note this has no effect on PSYCHIC weapons (e.g. the Devastating distance requirement of lightning strike).
  - name: Star Charts
    text: 'The Corsair Voidscarred utilise their peerless knowledge of the void to outmanoeuvre their foes. **STRATEGIC GAMBIT**. Roll one D3: if the result is higher than the number of the current turning point, you gain 1CP and cannot use this **STRATEGIC GAMBIT** for the rest of the battle.'
factionRules:
  - name: Rifles
    text: |-
      Whilst not all Aeldari outcasts have walked the Path of the Warrior, all are skilled in the use of rifles.
      
      Whenever a friendly **CORSAIR VOIDSCARRED** operative is shooting with a shuriken rifle or ranger long rifle during an activation in which it hasn't performed the Charge, Fall Back or Reposition action, that weapon has the Accurate 1 weapon rule.
      
      Note that operative isn't restricted from performing those actions after shooting.
  - name: Aeldari Raiders
    text: Aeldari are lithe, graceful and swift – qualities the Corsair Voidscarred utilise to outmanoeuvre their enemies. Each friendly **CORSAIR VOIDSCARRED** operative can perform a free Dash action during their activation.
  - name: Corsair Voidscarred
    text: MARKER/**TOKEN GUIDE** Erudite Hunter token Faolchú's Bond token Warding Shield token One Step Ahead token Mistfield token Runes of Guidance token
firefightPloys:
  - name: Opportunistic Fighters
    text: |-
      Should the foe show weakness, the Corsair Voidscarred will redouble their attack, seeking to slaughter the enemy before they can regroup.
      
      Use this firefight ploy when an enemy operative performs the Fall Back action. Before it moves, inflict 2D3 damage on that operative for each friendly **CORSAIR VOIDSCARRED** operative within its control range.
  - name: Light Fingers
    text: |-
      The pursuit of riches drives all Corsairs. These lithe raiders may pluck a prize from under the nose of a foe and disappear before a blow can be landed in return.
      
      Use this firefight ploy during a friendly **CORSAIR VOIDSCARRED** operative's activation. Until the end of that activation, having an enemy operative within its control range doesn't prevent that friendly operative from performing the Pick Up Marker or mission actions.
  - name: Capricious Flight
    text: |-
      Always outnumbered and often outgunned, the Corsair Voidscarred utilise feints and trickery to strike before melting away into shadow.
      
      Use this firefight ploy during a friendly **CORSAIR VOIDSCARRED** operative's activation, before or after it performs an action. During that activation, that operative can perform the Fall Back action for 1 less AP.
  - name: Contemptuous Adventurer
    text: |-
      The Corsair Voidscarred possess a fearless arrogance that is often justified by their superior skill at arms.
      
      Use this firefight ploy when the first friendly **CORSAIR VOIDSCARRED** operative is activated during the turning point, if it's more than 5" from other friendly operatives. The first time that operative performs either the Shoot or Fight action during that activation, its weapons have the Relentless weapon rule.
      
      Note this ploy cannot come into effect more than once per activation (you cannot use it during both the Shoot and Fight action in the same activation).
operativeSelection:
  archetype: Infiltration, Recon
  text: |-
    # Operatives
    
    1 **CORSAIR VOIDSCARRED FELARCH** operative with one of the following options:
      - Shuriken rifle; shuriken pistol; power weapon
      - Neuro disruptor; power weapon
    8 **CORSAIR VOIDSCARRED** operatives selected from the following list:
      - **FATE DEALER**
      - **GUNNER with one of the following options:**
        - Blaster ; shuriken pistol; fists
        - Shredder; shuriken pistol; fists
      - **HEAVY GUNNER with one of the following options:**
        - Shuriken cannon; shuriken pistol; fists
        - Shuriken pistol; wraithcannon ; fists
      - **KURNATHI**
      - **KURNITE HUNTER**
      - **SHADE RUNNER**
      - **SOUL WEAVER**
    
      - **STARSTORM DUELLIST**
      - **WARRIOR with one of the following options:**
        - Shuriken pistol; power weapon
        - Shuriken rifle; fists
      - **WAY SEEKER**
    
    Other than **WARRIOR** operatives, your kill team can only include each operative on this list once.
    
    Your kill team cannot include both a blaster and a wraithcannon.
strategyPloys:
  - name: Plunderers
    text: Aeldari Corsairs prioritise profit over glory, moving swiftly towards their objective in the hope of seizing their prize before the foe can react. Up to D3 friendly **CORSAIR VOIDSCARRED** operatives can immediately perform a free Dash action in an order of your choice. This turning point, each that does so cannot perform the Dash action during their activation. You cannot use this ploy during the first turning point.
  - name: Piratical Profiteers
    text: |-
      Any foolish enough to attempt to contest a prize claimed by the Corsair Voidscarred will soon find themselves caught in a blizzard of shuriken fire and sword thrusts.
      
      Whenever a friendly **CORSAIR VOIDSCARRED** operative is shooting, fighting or retaliating, if it or the enemy operative in that sequence contests an objective marker or one of your mission markers, that friendly operative's weapons have the Balanced weapon rule.
  - name: Mobile Engagement
    text: |-
      Aeldari Corsairs rely upon blistering speed to avoid heavy fire.
      
      Whenever an operative is shooting a friendly **CORSAIR VOIDSCARRED** operative that performed an action in which it moved during this turning point, you can re-roll one of your defence dice.
  - name: Outcasts
    text: |-
      Those who walk the Path of the Outcast are no strangers to solitude. Some even fight better alone.
      
      Whenever a friendly **CORSAIR VOIDSCARRED** operative is more than 5" from other friendly operatives, its weapons have the Punishing weapon rule.
supplementaryInfo: |-
  # Corsair Voidscarred: Update Log
  
  Rules will be periodically updated to maintain fair balance and interact more smoothly with the game. Rules changes will be updated directly into online documents and then listed below. Any minor changes to standardise wording that don't have any practical impact on the rule will be updated directly into online documents but not be listed here.
  
  # Errata January '26
  
  This section collects amendments to the rules. Amended text for clarification and edits are shown in blue, while amended text for balance updates are shown in magenta.
  
  # Shade Runner Operative, Blink Pack Rule
  
  Last sentence deleted: ~~'This operative cannot warp jump during the same activation in which it performed the Dash action (or vice versa).'~~
  
  # Previous Erratas Firefight Ploys, Capricious Flight
  
  First sentence changed to read: 'Use this firefight ploy during a friendly **CORSAIR VOIDSCARRED** operative's activation, before or after it performs an action.'
  
  # Felarch Operative, One Step Ahead Rule
  
  Relevant parts of first and second sentences deleted: ~~'Once per battle, after an enemy operative performs an action during its activation, if this operative is ready, you can use this rule. If you do, roll one D6: if the result is higher than that enemy operative'~~s APL stat, you can interrupt that activation and immediately […]'
  
  # Kurnite Hunter Operative, Faolchú's Bond Rule
  
  Relevant part changed to read: 'The first time during each turning point that this operative is retaliating, if it's ready it hasn't used its Faolchú ranged weapon during this turning point, in the Resolve Attack Dice step of that sequence, […]'
  
  # Kurnite Hunter Operative, Erudite Hunter Rule
  
  Relevant parts of third sentence deleted: ~~'Once during this turning point, after that enemy operative performs an action in which it moves during its activation, you can interrupt that activation to use this rule.
  
  # Starstorm Duellist Operative, Pistol Barrage Action
  
  Condition changed to read: '~~
  
  This operative cannot perform this action while it has a Conceal order, or during an activation in which it performed the Shoot action (or vice versa).'
  
  # Shade Runner Operative, Slicing Attack Rule
  
  Additional text added between fourth and fifth sentence: 'You cannot inflict damage on an enemy operative that was not visible to this operative at the start of that action.'
  
  # Way Seeker Operative, Warding Shield Action
  
