factionEquipment:
  - name: Tempestus Daggers
    text: |-
      Awarded to each warrior of the Militarum Tempestus upon their induction to the ranks, these weapons double as a symbol of regimental pride.
      
      Friendly **TEMPESTUS AQUILON** operatives (excluding SERVO-SENTRY) have the following melee weapon:
      
      | NAME | ATK | HIT | DMG |
      |------|-----|-----|-----|
      | Tempestus dagger | 3 | 4+ | 3/4 |
  - name: Combat Stimms
    text: |-
      The use of Munitorum-approved combat stimulants is standard practice amongst the Tempestus Aquilons, who may have to remain alert and fighting for days at a time.
      
      You can ignore any changes to the Move stat of friendly **TEMPESTUS AQUILON** operatives from being injured.
  - name: Drop Augury
    text: |-
      Prior to the commencement of hostilities, this region has been subjected to thorough augur scans by orbiting warships or hovering servo-skulls, the resultant intelligence inloaded to the Tempestor's slate monitron.
      
      Once per battle, when a friendly **TEMPESTUS AQUILON** operative that's set up above is activated, before expending or landing that operative, you can move one of your Drop markers again. However, it cannot be moved closer to your opponent's drop zone.
  - name: Remote Overseer
    text: |-
      Be it a high-flying observer aircraft or a specialist team of lexmechanicae employing tactical augur banks, monitoring officers provide wider strategic insight as the firefight rages.
      
      Once per battle, after rolling off to decide initiative, you can re-roll your dice.
factionRules:
  - name: Drop Insertion
    text: 'When setting up a **TEMPESTUS AQUILON** kill team before the battle, the first third of your kill team must be set up as normal. Each third thereafter can be set up above: place them to one side instead of in the killzone. For each third that''s set up above, you must set up the whole third in this way (not some of them), then place one of your Drop markers wholly within your drop zone. As a **STRATEGIC GAMBIT** in the first and second turning point, you can move your Drop markers up to 4" horizontally. In a killzone that uses the close quarters rules (e.g. Killzone: Tomb World), this can be measured and moved through Wall terrain. In the Firefight phase, friendly **TEMPESTUS AQUILON** operatives set up above are activated as normal. When you do, you can either expend or land that operative. If it lands, set it up in the killzone in a location it can be placed as follows (it''s no longer set up above):'
  - name: Rule
    text: |-
      - Within 3" horizontally of one of your Drop markers, or wholly within your drop zone.
        - Not within control range of enemy operatives (unless you're setting up a PRECURSOR operative, which can be set up within control range of an enemy operative).
        - With no part of its base underneath Vantage terrain.
        - With an order of your choice. The operative is treated as performing the Reposition action (spend the AP accordingly), then continue its activation as normal. It's obscured until the end of the next activation or the end of the turning point (whichever comes first). Less than half of your operatives can be set up above by the end of the first turning point. In other words, by the end of the first turning point, more than half of your operatives must have been set up in the killzone during the battle. When readying your operatives during the second and third turning points, remove one of your Drop markers. This means operatives still set up above are incapacitated at the end of the second turning point.
  - name: Grav-Chute
    text: Grav-chutes employ gravitic repulsion fields to allow their wearers to drop at a swift but measured pace and land safely, no matter from what height they fall. Whenever a friendly **TEMPESTUS AQUILON** operative is dropping, ignore the vertical distance.
  - name: Tempestus Aquilon
    text: MARKER/**TOKEN GUIDE** Detected token Drop and Secure token Drop marker Melta Bomb token
firefightPloys:
  - name: Hot Drop
    text: |-
      Aquilons are trained to drop into the thick of fighting, engaging a surprised enemy as they land.
      
      Use this firefight ploy after rolling your attack dice for a friendly **TEMPESTUS AQUILON** operative that's wholly within your opponent's territory, or either landed or dropped from Vantage terrain at least 2" higher than the killzone floor during this activation. If the target is within 6" of it, you can re-roll any of your attack dice.
  - name: Adjust Coordinates
    text: |-
      As the firefight flows and develops, so those Aquilons still descending adjust their trajectories in response.
      
      Use this firefight ploy when a friendly **TEMPESTUS AQUILON** operative lands. You can set it up within 5" horizontally of one of your Drop markers, taking precedence over the normal distance requirement. It cannot perform the Dash, Shoot or Fight actions during this turning point.
  - name: Tempestus Exemplars
    text: |-
      The training and conditioning of the Tempestus Aquilons allows them to stay focused on their mission, even during the most ferocious firefights.
      
      Use this firefight ploy during a friendly **TEMPESTUS AQUILON** operative's activation (excluding SERVO-SENTRY and any operative that has an APL stat higher than 2). During that activation, that operative can perform the Pick Up Marker, Place Marker or a mission action for 1 less AP.
  - name: Progena
    text: |-
      As graduates of the Schola Progenium, these warriors are not only conditioned to follow their orders with unquestioning precision, but are also driven by a zealous dedication to the Imperial Cult that helps them to shrug off pain and fear.
      
      Use this firefight ploy when a friendly **TEMPESTUS AQUILON** operative (excluding SERVO-SENTRY) is activated. It regains up to 2D3 lost wounds, and during that activation you can ignore any changes to its APL stat.
operativeSelection:
  archetype: Recon, Seek & Destroy
  text: |-
    # Operatives
    
    1 **TEMPESTUS AQUILON TEMPESTOR** operative with one of the following options:
      - Hot-shot laspistol; power weapon
      - Relic bolt pistol; chainsword
      - Hot-shot lascarbine; fists
    1 **TEMPESTUS AQUILON SERVO-SENTRY** with one of the following options:
      - Flamer
      - Grenade launcher
      - Hot-shot volley gun
    9 **TEMPESTUS AQUILON** operatives selected from the following list:
      - **GRENADIER**
      - **GUNFIGHTER**
      - **GUNNER with melta carbine and fists**
      - **GUNNER with plasma carbine and fists**
      - **MARKSMAN**
      - **PRECURSOR**
      - **TROOPER**
    
    Other than **TROOPER** operatives, your kill team can only include each operative on this list once.
strategyPloys:
  - name: Sudden Offensive
    text: Tempestus Aquilons are skilled at dropping swiftly into combat and catching their enemies unawares. Count the number of friendly **TEMPESTUS AQUILON** operatives that aren't incapacitated, then halve the result (rounding up) to give you x. Until the end of their activation, friendly **TEMPESTUS AQUILON** operatives' weapons have the Balanced weapon rule if they are the first friendly operatives activated this turning point equal to x. For example, if you have five operatives, the first three friendly operatives activated will benefit.
  - name: Maintain Momentum
    text: |-
      Once the assault begins, the Aquilons sustain the pressure, keeping their enemies reeling and off balance.
      
      Whenever a friendly **TEMPESTUS AQUILON** operative is shooting against or fighting against a ready enemy operative, that friendly operative's weapons have the Severe weapon rule.
  - name: Eye Above
    text: |-
      Airborne servo-skulls and spotter aircraft keep the Aquilons appraised of up-to-the-minute tactical data.
      
      Select one enemy operative. That operative and each other enemy operative within 3" of it gains one of your Detected tokens until the end of the turning point. Whenever an enemy operative that has one of your Detected tokens:
        - Is shooting a friendly **TEMPESTUS AQUILON** operative, you can re-roll one of your defence dice.
        - Is fighting or retaliating against a friendly **TEMPESTUS AQUILON** operative, one of your blocks can be allocated to block two unresolved successes (instead of one).
  - name: Drop and Secure
    text: |-
      Priority tactical objectives must be secured to ensure victory is absolute.
      
      Select one marker.
        - Until the Ready step of the next Strategy phase, when determining control of that marker, treat the total APL stat of friendly **TEMPESTUS AQUILON** operatives that contest it as 1 higher if at least one friendly **TEMPESTUS AQUILON** operative contests that marker. Note this isn't a change to the APL stat, so any changes are cumulative with this.
        - Whenever a friendly **TEMPESTUS AQUILON** operative is within 3" of that marker, add 1 to the Atk stat of its melee weapons (to a maximum of 4).
supplementaryInformation: |-
  # TEMPESTUS AQUILONS: UPDATE LOG
  
  Rules will be periodically updated to maintain fair balance and interact more smoothly with the game. Rules changes will be updated directly into online documents and then listed below. Any minor changes to standardise wording that don't have any practical impact on the rule will be updated directly into online documents but not be listed here.
  
  # ERRATA JUNE '25
  
  This section collects amendments to the rules. Amended text for clarification and edits are shown in blue, while amended text for balance updates are shown in magenta.
  
  ## GUNFIGHTER OPERATIVE, SALVO WEAPON RULE
  
  First sentence changed to read: 'Select up to two different valid targets that aren't within control range of friendly operatives.'
  
  # PREVIOUS ERRATAS
  
  ## STRATEGY PLOYS, MAINTAIN MOMENTUM
  
  Changed to read: 'Whenever a friendly **TEMPESTUS AQUILON** operative is shooting against or fighting against a ready enemy operative, that friendly operative's weapons have the Severe weapon rule.'
  
  ## STRATEGY PLOYS, DROP AND SECURE
  
  Relevant part of first sentence of first bullet point changed to read: 'Until the Ready step of the next turning point, when determining control of that marker, […]'
  
  ## FIREFIGHT PLOYS, HOT DROP
  
  First sentence changed to read: 'Use this firefight ploy after rolling your attack dice for a friendly **TEMPESTUS AQUILON** operative that's wholly within your opponent's territory, or either landed or dropped from Vantage terrain at least 2" higher than the killzone floor during this activation.'
  
  # TEAM SELECTION
  
  **SERVO-SENTRY**  moved to own separate arrow bullet point. Following sentence and asterisks on GUNNER, MARKSMAN and SERVO-SENTRY deleted: ~~'*You cannot select more than three of these operatives combined.'~~
  
  ## PRECURSOR OPERATIVE, TEMPESTUS DAGGER WEAPON
  
  'Ceaseless' weapon rule added.
  
  # TEMPESTUS AQUILON OPERATIVES
  
  A Tempestor leads their kill team into the thick of battle. More than just a warrior, they also possess the tactical and strategic nous to direct their squad's efforts. They exhibit a sense of agency and a flair for improvisation that can prove vital during extended operations behind enemy lines.
  
  # TEMPESTOR
  
  Tempestus Aquilons often find themselves facing powerful enemy assets without support, such as armoured fighting vehicles or elite warriors. In such instances, the melta and plasma carbines carried by a Gunner prove invaluable. A single burst from such weaponry can bring down a rampaging Genestealer Patriarch or Heretic Astartes Legionary.
  
  # GUNNER
  
  Given additional training on the prayers and activation rituals for combat ordnance, a Grenadier is the explosives specialist of their kill team. Whether it be crippling an enemy generatorum with a well-placed melta bomb or blasting enemies apart with hurled krak charges, they are equal to the task.
  
  # GRENADIER
  
  Some Aquilons exhibit the accuracy, aggression and reactions needed to become a Gunfighter. Wielding hot-shot laspistols, they lay down hails of close-range firepower. Such an operative is deadly in the close-quarters firefights typical of battles through fortifications or voidship corridors.
  
  # GUNFIGHTER
  
  Whether lining up the killing shot to complete an assassination mission or picking off elite enemy operatives in aid of their comrades, a Marksman provides invaluable support to their kill team. Their hot-shot long-las is an extremely potent weapon, whose distinctive whine and crack has been the last sound heard by countless enemies of the Imperium.
  
  # MARKSMAN
  
  # TEMPESTUS AQUILON OPERATIVES
  
  Grav-dropping into enemy territory risks being raked by the foe's firepower while still in midair. A Precursor specialises in dropping first, in as swift and stealthy a fashion as possible, then knocking out or distracting the most dangerous ground defences to help their comrades deploy unscathed.
  
  # PRECURSOR
  
  A servo-sentry is a combat mechanoid that drops via grav-impeller motors and provides Aquilon kill teams with fire support. Though slow moving, they are able to reposition during battle, obeying defensive subroutines to guard the team's flanks or fighting rearguard actions while their comrades fall back.
  
  # SERVO-SENTRY
  
  # TROOPERS
  
  Tempestus Aquilon Troopers are far from rank-and-file soldiery. Clad in resilient carapace armour and wielding powerful hot-shot lascarbines, these rigorously trained warriors boast discipline, accuracy and resilience. Coupled with the shock of these operatives dropping into battle via thrumming grav-chutes, this is a potent combination indeed.
  
  > **' THE EMPEROR EXPECTS TWO THINGS OF US. THE FIRST IS ABSOLUTE, UNCOMPROMISING BELIEF. THE SECOND IS VICTORY AT ANY COST.'**
  >
  > — Tempestor Tarlech Greff
  
  # ARCHETYPES
  
  # RECON SEEK & DESTROY
  
  Archetypes are used in certain mission packs, e.g. Approved Ops. The game sequence will specify how.
  
