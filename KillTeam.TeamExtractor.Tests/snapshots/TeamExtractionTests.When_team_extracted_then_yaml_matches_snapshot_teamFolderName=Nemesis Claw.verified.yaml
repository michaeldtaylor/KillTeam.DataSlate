  text: ''
strategyPloys:
  - name: We Have Come for You
    text: |-
      The Night Lords strike their foes swiftly, utilising shock, awe and terror to brutalise the enemy before they can lift a blade in response.
      
      Whenever a friendly **NEMESIS CLAW** operative is activated, if the first action it performs during that activation is the Charge action, when it ends its move during that action, you can inflict D3 damage on one enemy operative within its control range.
  - name: The Black Hunt
    text: |-
      A terrible malice burns within the twin hearts of each Night Lord, and they enjoy nothing more than toying with their wounded prey.
      
      Whenever a friendly **NEMESIS CLAW** operative is shooting against, fighting against or retaliating against a wounded enemy operative, you can re-roll one of your attack dice.
  - name: Preysight
    text: |-
      The Night Lords seem able to sense the fear of cowering prey, hunting down the craven with unerring precision.
      
      Whenever you're selecting a valid target for a friendly **NEMESIS CLAW** operative, enemy operatives within 6" of it cannot use Light terrain for cover. While this can allow such operatives to be targeted (assuming they're visible), it doesn't remove their cover save (if any).
  - name: Return to Darkness
    text: 'The Night Lords move from shadow to shadow with an agility and speed belied by their transhuman bulk. One friendly **NEMESIS CLAW** operative can immediately perform a free Fall Back or Reposition action, but it must end that move with Heavy terrain within its control range, or any part of its base underneath Vantage terrain. In addition, it cannot move more than 4" during that action and it cannot end that move closer to enemy operatives (in a killzone that uses the close quarters rules, e.g. Killzone: Tomb World, ignore Wall terrain when determining this).'
supplementaryInfo: |-
  **NEMESIS CLAW: UPDATE LOG**
  
  Rules will be periodically updated to maintain fair balance and interact more smoothly with the game. Rules changes will be updated directly into online documents and then listed below. Any minor changes to standardise wording that don't have any practical impact on the rule will be updated directly into online documents but not be listed here.
  
  **ERRATA JANUARY '26**
  
  This section collects amendments to the rules. Amended text for clarification and edits are shown in blue, while amended text for balance updates are shown in magenta.
  
  **FACTION EQUIPMENT, CHAIN SNARE**
  
  Last sentence changed to read: 'If any result is a 4+, that enemy operative cannot perform that action during that activation/counteraction (no AP are spent on it), and you cannot use this rule again during this turning point.'
  
  **PREVIOUS ERRATAS**
  
  **FACTION RULES, IN MIDNIGHT CLAD**
  
  First bullet point changed to read: 'It's more than 8" from enemy operatives it's visible to.'
  
  **FACTION EQUIPMENT, COMMS JAMMERS**
  
  Relevant part of first sentence changed to read: 'Whenever an enemy operative is within 3" of a friendly **NEMESIS CLAW** operative, […]'
  
  **FIREFIGHT PLOYS, DEATH TO THE FALSE EMPEROR**
  
  First sentence changed to read: 'Use this firefight ploy after rolling your attack dice for a friendly **NEMESIS CLAW** operative, if it's shooting against, fighting against or retaliating against an enemy operative that has the IMPERIUM keyword.'
  
  **FIREFIGHT PLOYS, VOX SCREAM**
  
  Changed to read: 'Use this firefight ploy when your opponent would activate an enemy operative that's visible to a friendly **NEMESIS CLAW** operative. Roll one D6; if the result is higher than that enemy operative's APL stat, your opponent cannot activate it during this activation; if the result is less than or equal to that enemy operative's APL stat, this ploy isn't used, the CP spent on it is refunded and you cannot use this ploy again during this turning point. If there are no other enemy operatives eligible to be activated, this ploy has no effect. This ploy costs you 1 additional CP for each previous time you've used it during the battle (e.g. 1CP the first time you would use it, 2CP the second time, etc.).'
  
  **STRATEGY PLOYS, RETURN TO DARKNESS**
  
  Last sentence changed to read: 'In addition, it cannot move more than 4" during that action and it cannot end that move closer to enemy operatives (in a killzone that uses the close quarters rules, e.g. Killzone: Gallowdark, ignore Wall terrain when determining this).'
  
  **FEARMONGER OPERATIVE, TERRORCHEM POISON**
  
  Changed to read: 'Whenever an operative that has one of your Terrorchem tokens is activated, inflict D3 damage on it.'
  
