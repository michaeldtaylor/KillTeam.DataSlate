factionEquipment:
  - name: Flayed Skin
    text: |-
      Bedecked with the bloody hides of butchered victims, the Night Lords inspire abject terror and revulsion in their enemies.
      
      Whenever an enemy operative is shooting against, fighting against or retaliating against a friendly **NEMESIS CLAW** operative within 2" of it, your opponent cannot re-roll their attack dice results of 1.
  - name: Chain Snare
    text: |-
      Composed of hooked blades attached to a length of chain, this weapon bites into the flesh or armour of the wielder's target, preventing them from fleeing.
      
      Whenever an enemy operative would perform the Fall Back action while within control range of a friendly **NEMESIS CLAW** operative, if no other enemy operatives are within that friendly operative's control range, you can use this rule. If you do, roll two D6, or one D6 if that enemy operative has a higher Wounds stat than that friendly operative. If any result is a 4+, that enemy operative cannot perform that action during that activation/counteraction (no AP are spent on it), and you cannot use this rule again during this turning point.
  - name: Grisly Trophy
    text: |-
      Severed hands and limbs, eyeballs plucked from the skulls of screaming victims – these macabre trophies and more cause the Night Lords' foes to waver.
      
      Once per battle, when a friendly **NEMESIS CLAW** operative incapacitates an enemy operative within 2" of it, you can use this rule. If you do, that friendly operative gains one of your Grisly Trophy tokens (if it doesn't already have one).
      
      Whenever a friendly **NEMESIS CLAW** operative that has one of your Grisly Trophy tokens is visible to and within 2" of an enemy operative, subtract 1 from the Atk stat of that enemy operative's weapons.
  - name: Comms Jammers
    text: |-
      The Night Lords use jamming devices to sow chaos and confusion by preventing their panicked foes from communicating.
      
      Whenever an enemy operative is within 3" of a friendly **NEMESIS CLAW** operative, that enemy operative's APL stat cannot be added to.
      
      Note that this doesn't affect APL stats that have already been changed.
factionRules:
  - name: Astartes
    text: 'These genetically modified superhumans are made for one purpose: war. During each friendly **NEMESIS CLAW** operative''s activation, it can perform either two Shoot actions or two Fight actions. If it''s two Shoot actions, a bolt pistol, boltgun or scoped bolt pistol must be selected for at least one of them. Each friendly **NEMESIS CLAW** operative can counteract regardless of its order.'
  - name: In Midnight Clad
    text: |-
      Night Lords are one with the darkness, employing it as an ally and a weapon.
      
      Whenever an enemy operative is shooting a friendly **NEMESIS CLAW** operative, that friendly operative is obscured if both of the following are true:
        - It's more than 8" from enemy operatives it's visible to.
        - It has Heavy terrain within its control range, or any part of its base is underneath Vantage terrain. MARKER/**TOKEN GUIDE** Portent token Terrorchem token Flay Them Alive token Disconcerting Mimicry token Poison Objective token Grisly Trophy token
  - name: Nemesis Claw
    text: Prescience points (Values 1 & 2)
firefightPloys:
  - name: Vox Scream
    text: |-
      By modulating the frequency of their helm-mounted vox-units, Night Lord operatives can unleash a terrifying scream with the ability to stun an opponent.
      
      Use this firefight ploy when your opponent would activate an enemy operative that's visible to a friendly **NEMESIS CLAW** operative. Roll one D6; if the result is higher than that enemy operative's APL stat, your opponent cannot activate it during this activation; if the result is less than or equal to that enemy operative's APL stat, this ploy isn't used, the CP spent on it is refunded and you cannot use this ploy again during this turning point. If there are no other enemy operatives eligible to be activated, this ploy has no effect.
  - name: Death to the False Emperor
    text: |-
      The Night Lords, like all Heretic Astartes, bear a particular hatred for the corpse-worshipping soldiers of the Imperium.
      
      Use this firefight ploy after rolling your attack dice for a friendly **NEMESIS CLAW** operative, if it's shooting against, fighting against or retaliating against an enemy operative that has the IMPERIUM keyword. That friendly operative's weapons have the Ceaseless weapon rule until the end of that sequence; if that enemy operative also has the **ADEPTUS ASTARTES** keyword, that friendly operative's weapons have the Relentless weapon rule until the end of that sequence instead.
  - name: Proclivity for Murder
    text: |-
      Each brutal kill a Night Lord performs serves to feed their bloodlust and drives them to further acts of terrible violence.
      
      Use this firefight ploy after a friendly **NEMESIS CLAW** operative incapacitates an enemy operative within its control range. That friendly operative can immediately perform a free Charge or Dash action (for the former, it cannot move more than 3"), even if it's performed an action that prevents it from performing those actions.
  - name: Dirty Fighter
    text: |-
      The Night Lords have no respect for the concept of honour and will use whatever underhanded tactics they deem necessary.
      
      Use this firefight ploy when a friendly **NEMESIS CLAW** operative is retaliating, at the start of the Resolve Attack Dice step. You can resolve one of your successes before the normal order. If you do, you cannot resolve any other successes during that sequence.
operativeSelection:
