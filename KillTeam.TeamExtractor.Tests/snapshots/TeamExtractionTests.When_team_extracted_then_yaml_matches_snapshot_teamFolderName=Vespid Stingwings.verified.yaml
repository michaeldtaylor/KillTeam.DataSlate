  # DESIGNER'S COMMENTARY
  
  Vespid Stingwings are an offensive kill team with swarm-like instinctual behaviours. They have some powerful ranged weapons, but your operatives will always prioritise a close threat, so you'll have to plan your attacks to maximise their offensive potential. As a player, imagine yourself as a member of the T'au Fire caste working to control this highly aggressive xenos species. This is done through Communion points – a representation of the T'au's efforts to command the Vespid. Ordinarily, your operatives will overlook objectives and prioritise attacking a close enemy. If you wish to exert more tactical control, you'll need to spend Communion points. Communion points are a limited resource that temporarily allows you to ignore a Vespid's weakness. You'll have to spend them wisely though, particularly if your opponent understands Vespid behaviour and positions their operatives appropriately to exploit it. Against a highly aggressive enemy, however, you may be able to swarm them – always shooting and charging the closest enemy operative – saving you Communion points for key re-rolls instead. Vespid shooting can be some of the most devastating in the game. When they move, they charge up their neutron weapons. Combine this with the Airborne Predators strategy ploy and even your most basic neutron weapon will have Piercing 1, Balanced and Devastating 2. Vespids have no way of improving their APL stat, however, so moving and shooting can leave them vulnerable to enemy counterattacks. Carefully consider your timing and angles of attack, as well as the Hardened Exoskeleton and Aerial Agility strategy ploys, to preserve your operatives after they've engaged. Vespids are capable of bullying weaker operatives when fighting. The Sting strategy ploy and Aggression Stimulant equipment add up to make their low 3 attack claws Lethal 5+, Shock and Ceaseless. This makes your team a hybrid against teams with 7 wounds and low attacks – they can pivot to this style of play when needed. This team has strong mobility, being able to fly across the board while ignoring terrain and other operatives. This can allow you to land ambushes against unsuspecting enemies, gain ground on Vantage terrain and reposition quickly as the battle develops. Your opponent should be wary of this mobile threat, but you need to be mindful of being too aggressive. It can be tempting to deal alpha strikes and engage fast, but if your opponent can survive it, your operatives will now be out of position and vulnerable for the latter stages of the battle. Overall, the Vespid Stingwings are a team with dangerous shooting and excellent mobility, but they must be carefully managed – particularly against a canny opponent – as their tactical application can be a weakness. Think carefully about when to use your Communion points, be clever with your movement and try to control the flow of battle so that the fighting and shooting are on your terms.
  
  > **' WE GIVE THEM THE TOOLS OF MARTIAL EXCELLENCE. THEY, IN RETURN, GIVE US THEIR LIVES TO SPEND. IT SEEMS AT TIMES A DESPERATE TRADE.'**
  >
  > — Shas'ui Bor'kan Ghol, sequestered for re-education in the tenets of the T'au'Va
  
  # VESPID STINGWINGS » DESIGNER'S COMMENTARY
universalEquipment:
  - name: Portable Barricade
    text: |-
      Little more than a suppression shield with armoured feet, these barricades can be hefted and borne forwards to provide mobile cover.
      
      A portable barricade is Light, Protective and Portable terrain, except the feet which are Insignificant and Exposed. Before the battle, you can set it up wholly within your territory, on the killzone floor and more than 2" from other equipment terrain features, access points and Accessible terrain. Protective: While an operative is in cover from this terrain feature, improve its Save stat by 1 (to a maximum of 2+). RULE
  - name: Utility Grenades
    text: |-
      From neuro-suppressant psybombs to smoke-belching chemical charges, grenades of this sort can suppress the enemy and be the difference between life and death.
      
      When you select this equipment, select two utility grenades (2 smoke, 2 stun, or 1 smoke and 1 stun). Each selection is a unique action your operatives can perform, but your kill team can only perform that action a total number of times during the battle equal to your selection. RULE
  - name: Ammo Cache
    text: |-
      - Whether stockpiles deliberately set out for warriors to access quickly, or the abandoned munitions of the slain, these caches can prove vital for a swift reload in the heat of battle.
      
      Before the battle, you can set up one of your Ammo Cache markers wholly within your territory. Friendly operatives can perform the following mission action during the battle. **AMMO RESUPPLY** 0AP One of your Ammo Cache markers the active operative controls is used during this turning point. Until the start of the next turning point, whenever this operative is shooting with a weapon from its datacard, you can re-roll one of your attack dice.
      - An operative cannot perform this action while within control range of an enemy operative, if that marker isn't yours, or if that marker has been used this turning point.
  - name: Razor Wire
    text: |-
      Spooled rapidly out and affixed to jutting posts, razor wire acts as an easily deployed barrier and a painful deterrent to enemy operatives seeking to attack along particular routes.
      
      Razor wire is Exposed and Obstructing terrain. Before the battle, you can set it up wholly within your territory, on the killzone floor and more than 2" from other equipment terrain features, access points and Accessible terrain. Obstructing: Whenever an operative would cross over this terrain feature within 1" of it, treat the distance as an additional 1".
  - name: Comms Device
    text: |-
      Communications devices can be swiftly hijacked and employed to coordinate operations or call in support during a firefight.
      
      Before the battle, you can set up one of your Comms Device markers wholly within your territory. While a friendly operative controls this marker, add 3" to the distance requirements of its SUPPORT rules that refer to friendly operatives (e.g. 'select one friendly operative within 6"' would be 9" instead). Note that you cannot benefit from your opponent's Comms Device markers.
  - name: Mines
    text: |-
      The battlefields of the 41st Millennium are plagued by myriad types of mine, from simple frag charges to monofilament web-snares and microplasma charges. Ultimately, all serve a similar, horrible purpose.
      
      Before the battle, you can set up one of your Mines markers wholly within your territory and more than 2" from other markers, access points and Accessible terrain. The first time that marker is within an operative's control range, remove that marker and inflict D3+3 damage on that operative.
  - name: Light Barricades
    text: |-
      Designed to be lugged into place and then deployed by operatives and combat engineers, these barriers are proof against small arms fire.
      
      Light barricades are Light terrain, except the feet, which are Insignificant and Exposed. Before the battle, you can set up any of them wholly within your territory, on the killzone floor and more than 2" from other equipment terrain features, access points and Accessible terrain.
  - name: Heavy Barricade
    text: |-
      A redoubtable slab of plasteel and adamantine, this layered protective barrier provides shelter amidst the fiercest firefights.
      
      A heavy barricade is Heavy terrain. Before the battle, you can set it up wholly within 4" of your drop zone, on the killzone floor and more than 2" from other equipment terrain features, access points and Accessible terrain.
  - name: Ladders
    text: |-
      Carried into battle in their compacted forms, these ladders provide a rapid route of ingress to strongholds, or access to vital vantage points.
      
      Ladders are Insignificant and Exposed terrain. Before the battle, you can set up any of them as follows:
        - Wholly within your territory.
        - Upright against terrain that's at least 2" tall.
        - More than 2" from other equipment terrain features.
        - More than 1" from doors and access points.
      
      Once per action, whenever an operative is climbing the terrain feature a ladder is placed against, treat the vertical distance as 1" if the ladder is within that operative's control range during that entire climb.
  - name: Explosive Grenades
    text: |-
      A variety of offensive grenades are employed by the forces of the 41st Millennium. These range from simple fragmentation grenades to plasma and gravitic concussion grenades, while even more exotic devices are used to crack open enemy armour.
      
      When you select this equipment, select two explosive grenades (2 frag, 2 krak, or 1 frag and 1 krak). Each selection is a ranged weapon your operatives can use, but your kill team can only use that weapon a total number of times during the battle equal to your selection.
      
      | NAME | ATK | HIT | DMG | WR |
      |------|-----|-----|-----|----|
      | Frag grenade | 4 | 4+ | 2/4 | Range 6", Blast 2", Saturate |
      
      | NAME | ATK | HIT | DMG | WR |
      |------|-----|-----|-----|----|
      | Krak grenade | 4 | 4+ | 4/5 | Range 6", Piercing 1, Saturate |
