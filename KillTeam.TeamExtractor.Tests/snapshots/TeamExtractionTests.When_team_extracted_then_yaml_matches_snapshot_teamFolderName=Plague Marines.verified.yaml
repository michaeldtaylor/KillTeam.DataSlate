        text: |-
          This operative can use blight and krak grenades (see faction and universal equipment). Doing so doesn't count towards any limited uses you have (i.e. if you also select those grenades from equipment for other operatives).
          
          Whenever it's doing so, improve the Hit stat of that weapon by 1 and blight grenades have the Toxic weapon rule (see right).
    specialRules:
